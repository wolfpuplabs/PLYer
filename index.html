<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gaussian Splat Viewer (Upload Mode)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* Panel Upload */
        #upload-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #upload-panel.dragover {
            border-color: #00bcd4;
            background: rgba(0, 188, 212, 0.1);
        }
        .upload-btn {
            display: inline-block;
            background: #00bcd4;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .upload-btn:hover {
            background: #00e5ff;
        }
        #file-input {
            display: none;
        }
        /* Status Loading */
        #loading-info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 9;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.2/build/gaussian-splats-3d.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="upload-panel">
        <h2>3DGS PLY Viewer</h2>
        <p>Drop file <b>.ply</b> atau <b>.splat</b> kamu di sini</p>
        <p>atau</p>
        <label for="file-input" class="upload-btn">Pilih File</label>
        <input type="file" id="file-input" accept=".ply,.splat">
    </div>

    <div id="loading-info font-weight: bold;">Memproses file... silakan tunggu.</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

        const uploadPanel = document.getElementById('upload-panel');
        const fileInput = document.getElementById('file-input');
        const loadingInfo = document.getElementById('loading-info');
        
        let viewer = null;

        // Inisialisasi awal viewer (kosong dulu)
        function initViewer() {
            viewer = new GaussianSplats3D.Viewer({
                'cameraUp': [0, 1, 0],
                'initialCameraPosition': [0, 1, 3],
                'initialCameraLookAt': [0, 0, 0],
                'halfPrecisionChunks': false,
                'sharedMemoryForWorkers': false
            });
        }

        // Fungsi untuk membaca file yang dimasukkan
        function handleFile(file) {
            if (!file) return;

            // Tampilkan loading, sembunyikan panel upload
            uploadPanel.style.display = 'none';
            loadingInfo.style.display = 'block';

            if (!viewer) initViewer();

            // Ubah file lokal menjadi URL sementara (Blob URL)
            const fileURL = URL.createObjectURL(file);

            // Muat file ke dalam viewer
            viewer.addSplatScene(fileURL, {
                'splatAlphaRemovalThreshold': 5,
                'showLoadingUI': true
            })
            .then(() => {
                loadingInfo.style.display = 'none';
                viewer.start();
            })
            .catch((error) => {
                console.error(error);
                alert("Gagal memuat file. Pastikan format file .ply 3DGS kamu benar.");
                uploadPanel.style.display = 'block';
                loadingInfo.style.display = 'none';
            });
        }

        // --- EVENT LISTENER UNTUK UPLOAD ---

        // 1. Lewat Tombol Jelajahi File
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // 2. Lewat Drag & Drop
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadPanel.classList.add('dragover');
        });

        window.addEventListener('dragleave', () => {
            uploadPanel.classList.remove('dragover');
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadPanel.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

    </script>
</body>
</html>
