<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3DGS Mobile Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #upload-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            color: white;
            z-index: 10;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .upload-btn {
            display: inline-block;
            background: #00bcd4;
            color: black;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        #file-input {
            display: none;
        }
        #loading-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.85);
            padding: 20px 40px;
            border-radius: 12px;
            display: none;
            z-index: 9;
            font-weight: bold;
            text-align: center;
        }
    </style>
    <script type="module" src="https://unpkg.com/@lumaai/luma-webgl@0.2.0/dist/library/luma-webgl.js"></script>
</head>
<body>

    <div id="upload-panel">
        <h2 style="margin-top:0;">Luma PLY Viewer</h2>
        <p>Pilih file .ply Gaussian Splatting</p>
        <label for="file-input" class="upload-btn">Pilih File</label>
        <input type="file" id="file-input" accept=".ply">
    </div>

    <div id="loading-info">
        Merender Objek 3D...<br>
        <span style="font-size:12px; font-weight:normal; color:#aaa;">Memakan waktu beberapa detik di iPad</span>
    </div>
    
    <div id="canvas-container"></div>

    <script type="module">
        // Pastikan library Luma terisi
        const uploadPanel = document.getElementById('upload-panel');
        const fileInput = document.getElementById('file-input');
        const loadingInfo = document.getElementById('loading-info');
        const container = document.getElementById('canvas-container');

        function handleFile(file) {
            if (!file) return;

            uploadPanel.style.display = 'none';
            loadingInfo.style.display = 'block';

            const fileURL = URL.createObjectURL(file);

            // Inisialisasi Luma WebGL Viewer (Sangat ringan untuk iOS)
            try {
                const viewer = new LumaGL.SplatViewer({
                    container: container,
                    source: fileURL,
                    renderingArgs: {
                        enableAntialiasing: false // Matikan demi performa iPad
                    }
                });

                viewer.onLoad = () => {
                    loadingInfo.style.display = 'none';
                };

                viewer.onError = (err) => {
                    alert("Error: " + err);
                    resetUI();
                };

            } catch (e) {
                alert("Browser ini tidak mendukung WebGL2 secara penuh.");
                resetUI();
            }
        }

        function resetUI() {
            uploadPanel.style.display = 'block';
            loadingInfo.style.display = 'none';
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
    </script>
</body>
</html>
