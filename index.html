<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3DGS iPad Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #upload-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            color: white;
            z-index: 10;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .upload-btn {
            display: inline-block;
            background: #00bcd4;
            color: black;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        #file-input {
            display: none;
        }
        #loading-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.85);
            padding: 20px 40px;
            border-radius: 12px;
            display: none;
            z-index: 9;
            font-weight: bold;
            text-align: center;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.2/build/gaussian-splats-3d.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="upload-panel">
        <h2 style="margin-top:0;">3DGS iPad Viewer</h2>
        <p>Pilih file <b>.ply</b> atau <b>.splat</b> kamu</p>
        <label for="file-input" class="upload-btn">Pilih File</label>
        <input type="file" id="file-input" accept=".ply,.splat">
    </div>

    <div id="loading-info">
        Membaca data file...<br>
        <span id="progress-text" style="font-size:12px; font-weight:normal; color:#aaa;">Memuat memori grafis...</span>
    </div>
    
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

        const uploadPanel = document.getElementById('upload-panel');
        const fileInput = document.getElementById('file-input');
        const loadingInfo = document.getElementById('loading-info');
        const progressText = document.getElementById('progress-text');
        
        let viewer = null;

        function handleFile(file) {
            if (!file) return;

            uploadPanel.style.display = 'none';
            loadingInfo.style.display = 'block';

            // Gunakan FileReader untuk membaca file mentah langsung ke ArrayBuffer lokal
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                progressText.innerText = "Mengurai data 3D Splatting...";

                // Bangun viewer jika belum ada
                if (!viewer) {
                    viewer = new GaussianSplats3D.Viewer({
                        'cameraUp': [0, 1, 0],
                        'initialCameraPosition': [0, 1, 3],
                        'initialCameraLookAt': [0, 0, 0],
                        'halfPrecisionChunks': true,     // Sangat penting untuk menghemat RAM iPad
                        'sharedMemoryForWorkers': false, // Wajib mati di iOS
                        'useBuiltInControls': true
                    });
                }

                // Masukkan ArrayBuffer secara langsung tanpa internal fetch
                const isSplat = file.name.endsWith('.splat');
                
                viewer.addSplatScenes([{
                    'data': arrayBuffer,
                    'format': isSplat ? 'splat' : 'ply'
                }])
                .then(() => {
                    loadingInfo.style.display = 'none';
                    viewer.start();
                })
                .catch((error) => {
                    alert("Gagal merender data: " + error.message);
                    resetUI();
                });
            };

            reader.onerror = function() {
                alert("Gagal membaca file dari penyimpanan iPad.");
                resetUI();
            };

            // Mulai membaca file
            reader.readAsArrayBuffer(file);
        }

        function resetUI() {
            uploadPanel.style.display = 'block';
            loadingInfo.style.display = 'none';
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());
    </script>
</body>
</html>
