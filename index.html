<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark.js 3D Gaussian Splatting Demo</title>
    <style>
        /* Mengatur agar canvas memenuhi seluruh layar browser */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Overlay UI sederhana mirip dokumentasi Spark */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; /* Klik tembus ke canvas */
            z-index: 10;
        }

        #ui-overlay h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #ui-overlay p {
            margin: 0;
            font-size: 14px;
            color: #aaa;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            font-weight: 500;
            z-index: 5;
            transition: opacity 0.5s ease;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
                "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.1.0/spark.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="ui-overlay">
        <h1>✨ Spark.js Demo</h1>
        <p>3D Gaussian Splatting Renderer untuk THREE.js</p>
    </div>

    <div id="loading">Memuat model 3D Splatting...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { SparkRenderer, SplatMesh } from '@sparkjsdev/spark';

        // 1. Inisialisasi Scene, Kamera, dan WebGLRenderer dasar THREE.js
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1, 4); // Mengatur posisi kamera awal

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 2. Tambahkan OrbitControls agar user bisa berinteraksi (Rotate/Zoom/Pan)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 3. Membuat SparkRenderer (Wajib pada Spark 2.0+ untuk merender splats)
        const spark = new SparkRenderer({ renderer });
        scene.add(spark);

        // 4. Memuat Model 3D Gaussian Splat (.spz / .ply / .splat)
        // Kita menggunakan asset 'butterfly' default dari server Spark.js
        const splatURL = "https://sparkjs.dev/assets/splats/butterfly.spz";
        
        const butterfly = new SplatMesh({ 
            url: splatURL,
            onLoad: () => {
                // Sembunyikan tulisan loading jika model sudah termuat
                const loadingEl = document.getElementById('loading');
                if (loadingEl) loadingEl.style.opacity = 0;
            }
        });

        // Mengatur rotasi dan posisi awal mesh splat
        butterfly.quaternion.set(1, 0, 0, 0);
        butterfly.position.set(0, 0, 0);
        scene.add(butterfly);

        // 5. Animation Loop
        renderer.setAnimationLoop(function animate(time) {
            // Update kontrol kamera
            controls.update();

            // Efek animasi rotasi otomatis pada objek kupu-kupu
            if (butterfly) {
                butterfly.rotation.y += 0.005;
            }

            // Render scene utama
            renderer.render(scene, camera);
        });

        // 6. Handle perubahan ukuran layar (Responsive layout)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
